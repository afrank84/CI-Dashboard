<!DOCTYPE html>
<html>
<head>

<title>Frank CI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:20px;
}

.container{
padding:20px;
}

.search{
margin-bottom:20px;
}

input{
padding:8px;
width:300px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

.pass{color:#22c55e}
.fail{color:#ef4444}
.running{color:#facc15}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:8px;
}

</style>

</head>

<body>

<header>
<h2>Frank CI Dashboard</h2>
</header>

<div class="container">

<div class="search">
<input id="searchBox" placeholder="Search repository...">
</div>

<div class="grid">

<div class="card">
<h3>Build Success Rate</h3>
<canvas id="successChart"></canvas>
</div>

<div class="card">
<h3>Average Coverage</h3>
<canvas id="coverageChart"></canvas>
</div>

<div class="card">
<h3>Queue Time</h3>
<canvas id="queueChart"></canvas>
</div>

</div>

<div class="card">

<h3>Repositories</h3>

<table id="repoTable">

<tr>
<th>Repo</th>
<th>Status</th>
<th>Branch</th>
<th>Commit</th>
<th>Author</th>
<th>Duration</th>
<th>Coverage</th>
<th>Env</th>
</tr>

</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
