<!DOCTYPE html>
<html>

<head>

<title>Frank CI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:20px;
}

.container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

.pass{color:#22c55e;}
.fail{color:#ef4444;}

.card{
background:#1e293b;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<header>
<h2>Frank CI Dashboard</h2>
</header>

<div class="container">

<div class="card">

<h3>Repositories</h3>

<table id="repoTable">

<tr>
<th>Repository</th>
<th>Status</th>
<th>Branch</th>
<th>Commit</th>
<th>Duration</th>
<th>Tests</th>
<th>Run</th>
</tr>

</table>

</div>

<div class="card">
<h3>Build Duration</h3>
<canvas id="durationChart"></canvas>
</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
